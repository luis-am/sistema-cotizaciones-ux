<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión | Sistema de Cotizaciones</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
  <main class="auth-wrapper">
    <div class="auth-box">
      <div class="brand-logo"><i class="bi bi-calculator"></i></div>
      <h1 class="page-title">Sistema de Cotizaciones</h1>
      <p class="page-subtitle mb-5">Ingresa a tu cuenta para continuar</p>

      <div class="auth-card auth-card-sm mx-auto mb-4" style="max-width: 820px;">
        <h2 class="section-title fs-1 mb-2">Iniciar Sesión</h2>
        <p class="section-subtitle mb-4">Accede con tu correo electrónico y contraseña</p>

        <form onsubmit="event.preventDefault(); handleLogin();">
          <div class="mb-3">
            <label class="form-label">Correo Electrónico</label>
            <input id="loginEmail" class="form-control" type="email" placeholder="usuario@ejemplo.com">
          </div>

          <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <input id="loginPassword" class="form-control" type="password" placeholder="••••••••">
          </div>

          <button type="button" class="btn btn-dark w-100 d-inline-flex justify-content-center align-items-center gap-3" onclick="handleLogin()">
            <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
          </button>
        </form>

        <div class="auth-links mt-4">
          <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
          <p class="mb-0">¿Olvidaste tu contraseña? <a href="recuperar-password.html">Recupérala aquí</a></p>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
