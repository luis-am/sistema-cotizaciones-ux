<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="../../assets/css/style.css" rel="stylesheet" />
    <title>editar-usuario</title>
  </head>
  <body>
    <header class="topbar">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4 py-2">
          <a class="navbar-brand d-flex align-items-center" href="#"
            ><span class="brand-logo"><i class="bi bi-calculator"></i></span>
            Sistema de Cotizaciones</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navRole"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navRole">
            <ul class="nav nav-pills mx-auto my-3 my-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="dashboard.html"
                  ><i class="bi bi-house me-2"></i>Inicio</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="usuarios.html"
                  ><i class="bi bi-people me-2"></i>Usuarios</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="cotizaciones.html"
                  ><i class="bi bi-file-earmark-text me-2"></i>Cotizaciones</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="reportes.html"
                  ><i class="bi bi-bar-chart me-2"></i>Reportes</a
                >
              </li>
            </ul>
            <div class="dropdown">
              <button
                class="user-chip border-0 bg-transparent dropdown-toggle d-flex align-items-center"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <span class="avatar">CA</span>
                <div class="text-start">
                  <div class="name">Carlos Administrador</div>
                  <div class="email">admin@cotizaciones.com</div>
                </div>
              </button>

              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <a class="dropdown-item" href="editar-usuario.html">
                    <i class="bi bi-person me-2"></i>Mi perfil
                  </a>
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a
                    class="dropdown-item text-danger"
                    href="#"
                    onclick="logout()"
                  >
                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main class="page-shell">
      <div class="d-flex align-items-center gap-3 mb-4">
        <a class="btn btn-link text-dark fw-bold fs-4 p-0" href="usuarios.html"
          ><i class="bi bi-arrow-left me-2"></i>Volver</a
        >
      </div>
      <div class="page-header">
        <h1 class="page-title">Editar Usuario</h1>
        <p class="page-subtitle">
          Actualiza la información, rol y estado del usuario
        </p>
      </div>
      <section class="section-card card-ui" style="max-width: 980px">
        <form class="row g-4">
          <div class="col-md-6">
            <label class="form-label">Nombre Completo</label
            ><input class="form-control" value="Pedro Vendedor" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Correo Electrónico</label
            ><input class="form-control" value="vendedor2@cotizaciones.com" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Teléfono</label
            ><input class="form-control" value="+1 (555) 200-0004" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Empresa</label
            ><input class="form-control" value="Cotizaciones.com" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Rol</label
            ><select class="form-select">
              <option>Administrador</option>
              <option selected>Vendedor</option>
              <option>Cliente</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Estado</label
            ><select class="form-select">
              <option>Activo</option>
              <option selected>Bloqueado</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Notas internas</label
            ><textarea class="form-control">
Usuario bloqueado temporalmente por revisión administrativa.</textarea
            >
          </div>
          <div class="col-12 d-flex gap-3 flex-wrap">
            <a class="btn btn-dark" href="usuarios.html">Guardar Cambios</a
            ><a class="btn btn-outline-dark" href="usuarios.html">Cancelar</a>
          </div>
        </form>
      </section>
    </main>
    <a class="help-fab" href="#"><i class="bi bi-question-lg"></i></a>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/quote-builder.js"></script>
  </body>
</html>
